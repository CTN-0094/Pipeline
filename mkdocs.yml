site_name: DAB Pipeline
site_description: A modular, reproducible pipeline for algorithmic bias detection in opioid use disorder treatment data
site_url: https://ctn-0094.github.io/Pipeline/
repo_url: https://github.com/CTN-0094/Pipeline
repo_name: CTN-0094/Pipeline

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

nav:
  - Home: index.md
  - Getting Started: quickstart.md
  - How It Works: pipeline.md
  - Outcomes: outcomes.md
  - Data: data.md
  - Input Format: input_format.md
  - References: references.md
  - Testing: testing.md
  - Code Reference:
    - Overview: code/index.md
    - API Reference: api.md
    - Constants: code/constants.md
    - Validation: code/validate.md
    - Preprocessing: code/preprocess.md
    - PSM & Cohorts: code/psm.md
    - Model Training: code/model_training.md
    - Models: code/models.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CTN-0094/Pipeline
  generator: false
